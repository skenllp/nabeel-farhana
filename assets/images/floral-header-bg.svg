<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgWash" cx="50%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#4d1420"/>
      <stop offset="55%" stop-color="#3a0f18"/>
      <stop offset="100%" stop-color="#22070d"/>
    </radialGradient>
    <radialGradient id="petalGold" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#e2c793"/>
      <stop offset="60%" stop-color="#bd9351"/>
      <stop offset="100%" stop-color="#8a6530"/>
    </radialGradient>
    <radialGradient id="petalRose" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#a8394c"/>
      <stop offset="65%" stop-color="#7c2536"/>
      <stop offset="100%" stop-color="#4d1420"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b3a20"/>
      <stop offset="100%" stop-color="#3a1c10"/>
    </linearGradient>

    <!-- one rose bloom, reused via <use> at different scales/positions -->
    <g id="rose">
      <ellipse cx="0" cy="8" rx="46" ry="34" fill="url(#petalRose)" opacity="0.55"/>
      <path d="M0,-40 C24,-38 34,-16 30,4 C26,24 8,34 0,34 C-8,34 -26,24 -30,4 C-34,-16 -24,-38 0,-40 Z" fill="url(#petalRose)"/>
      <path d="M0,-26 C15,-25 21,-10 19,3 C17,15 6,22 0,22 C-6,22 -17,15 -19,3 C-21,-10 -15,-25 0,-26 Z" fill="#e2c793" opacity="0.85"/>
      <path d="M0,-14 C8,-13 11,-5 10,2 C9,8 3,12 0,12 C-3,12 -9,8 -10,2 C-11,-5 -8,-13 0,-14 Z" fill="#f5ead6" opacity="0.9"/>
      <circle cx="0" cy="0" r="3.5" fill="#4d1420"/>
    </g>

    <g id="bud">
      <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#petalGold)"/>
      <path d="M0,-18 Q10,-6 0,10 Q-10,-6 0,-18 Z" fill="#e2c793" opacity="0.7"/>
    </g>

    <g id="leaf">
      <path d="M0,0 C22,-6 40,-22 44,-46 C22,-40 4,-24 0,0 Z" fill="url(#leafGrad)"/>
    </g>
  </defs>

  <rect width="1600" height="1000" fill="url(#bgWash)"/>

  <!-- vine strokes -->
  <g fill="none" stroke="#96702f" stroke-width="2" opacity="0.35">
    <path d="M-40,120 C220,60 380,220 560,140 C760,55 900,180 1120,110 C1320,45 1480,140 1660,90"/>
    <path d="M-40,860 C220,930 400,760 620,850 C840,940 1000,780 1220,860 C1400,925 1520,820 1660,880"/>
    <path d="M120,-40 C60,180 150,340 90,520 C40,680 140,820 80,1040"/>
    <path d="M1480,-40 C1540,180 1450,340 1510,520 C1560,680 1460,820 1520,1040"/>
  </g>

  <!-- top-left cluster -->
  <g opacity="0.92">
    <use href="#leaf" transform="translate(70,60) rotate(10) scale(1.6)"/>
    <use href="#leaf" transform="translate(150,40) rotate(70) scale(1.3)"/>
    <use href="#rose" transform="translate(120,110) scale(1.7)"/>
    <use href="#rose" transform="translate(230,60) scale(1.1)"/>
    <use href="#bud" transform="translate(300,140) rotate(-20) scale(1.4)"/>
  </g>

  <!-- top-right cluster -->
  <g opacity="0.9">
    <use href="#leaf" transform="translate(1480,50) rotate(160) scale(1.5)"/>
    <use href="#rose" transform="translate(1440,120) scale(1.5)"/>
    <use href="#rose" transform="translate(1340,60) scale(1.0)"/>
    <use href="#bud" transform="translate(1260,140) rotate(30) scale(1.3)"/>
  </g>

  <!-- bottom-left cluster -->
  <g opacity="0.9">
    <use href="#leaf" transform="translate(90,930) rotate(-30) scale(1.7)"/>
    <use href="#rose" transform="translate(150,880) scale(1.6)"/>
    <use href="#rose" transform="translate(250,940) scale(1.1)"/>
    <use href="#bud" transform="translate(320,850) rotate(15) scale(1.3)"/>
  </g>

  <!-- bottom-right cluster -->
  <g opacity="0.9">
    <use href="#leaf" transform="translate(1500,940) rotate(140) scale(1.6)"/>
    <use href="#rose" transform="translate(1430,880) scale(1.5)"/>
    <use href="#rose" transform="translate(1330,940) scale(1.05)"/>
    <use href="#bud" transform="translate(1260,860) rotate(-25) scale(1.3)"/>
  </g>

  <!-- soft scattered accents across the middle for texture -->
  <g opacity="0.35">
    <use href="#bud" transform="translate(500,300) rotate(45) scale(0.9)"/>
    <use href="#bud" transform="translate(1080,700) rotate(-60) scale(0.9)"/>
    <use href="#rose" transform="translate(800,500) scale(0.7)"/>
  </g>

  <!-- vignette for depth -->
  <rect width="1600" height="1000" fill="url(#bgWash)" opacity="0.15"/>
</svg>
